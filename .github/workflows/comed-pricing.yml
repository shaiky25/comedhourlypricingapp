# Run the ComEd notifier on a schedule in GitHub’s cloud (no home server).
# 1. Push this repo to GitHub.
# 2. Settings → Secrets and variables → Actions → New repository secret
#    (same names as in .env.example: SMTP_*, TWILIO_*, COMED_TZ, etc.)
# 3. Actions tab → enable workflows if prompted.
# 4. “Run workflow” to test (workflow_dispatch).

name: ComEd pricing alerts

on:
  schedule:
    # Every 10 minutes (UTC). ComEd window / dedup is handled in the script.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

concurrency:
  group: comed-pricing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore notifier state (dedup between runs)
        id: state_cache
        uses: actions/cache@v4
        with:
          path: .comed_notifier_state.json
          key: comed-state-${{ runner.os }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ComEd notifier
        env:
          COMED_TZ: ${{ secrets.COMED_TZ }}
          PRICE_THRESHOLD_CENTS: ${{ secrets.PRICE_THRESHOLD_CENTS }}
          ALERT_WINDOW_START_HOUR: ${{ secrets.ALERT_WINDOW_START_HOUR }}
          ALERT_WINDOW_END_HOUR: ${{ secrets.ALERT_WINDOW_END_HOUR }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          ALERT_SMS_TO: ${{ secrets.ALERT_SMS_TO }}
        run: python comed_pricing_agent.py
